<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PANZER — Giriş</title>
  <meta name="description" content="PANZER V3 Admin Panel Giriş">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="/BellaMain/assets/css/pzr-auth.css" rel="stylesheet">
  <link href="/BellaMain/assets/css/panzer-brand.css" rel="stylesheet">
</head>
<body class="pzr-auth-body">
  <div class="pzr-auth-wrapper">
    <div class="pzr-auth-hero">
      <img src="/BellaMain/assets/media/panzer-mark.png" alt="PANZER" class="pzr-auth-hero-logo pzr-dragon-anim" onerror="this.style.display='none'">
      <h1>PANZER</h1>
      <p>Komuta panelin seni bekliyor.</p>
    </div>
    <div class="pzr-auth-form-area">
      <div class="pzr-auth-card">
        <h2>Hoş Geldin</h2>
        <p class="pzr-subtitle">Hesabına giriş yap</p>
        <div id="alertBox" class="pzr-alert pzr-alert-error"></div>
        <form id="signinForm" autocomplete="off">
          <div class="pzr-form-group">
            <label for="kul_id">Kullanıcı Adı</label>
            <input type="text" id="kul_id" name="kul_id" placeholder="Kullanıcı adınızı girin" required autofocus>
          </div>
          <div class="pzr-form-group">
            <label for="kul_sifre">Şifre</label>
            <input type="password" id="kul_sifre" name="kul_sifre" placeholder="Şifrenizi girin" required>
          </div>
          <button type="submit" class="pzr-btn" id="submitBtn">Giriş Yap</button>
        </form>
        <div class="pzr-auth-footer">Hesabın yok mu? <a href="/signup">Kayıt Ol</a></div>
      </div>
    </div>
  </div>
  <div class="pzr-version">PANZER v3 · the designedbybossxxlife</div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
  <script>
    document.getElementById('signinForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alertBox = document.getElementById('alertBox');
      alertBox.style.display = 'none';
      const kul_id = document.getElementById('kul_id').value.trim();
      const kul_sifre = document.getElementById('kul_sifre').value;
      if (!kul_id || !kul_sifre) { alertBox.textContent = 'Lütfen tüm alanları doldurun.'; alertBox.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Giriş yapılıyor...';
      try {
        const res = await fetch('/api/auth/signin', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({kul_id,kul_sifre}) });
        const data = await res.json();
        if (data.sonuc === 'tamam') { Swal.fire({icon:'success',title:'Giriş Başarılı!',timer:1500,showConfirmButton:false}); setTimeout(() => window.location.href='/dashboard', 1200); }
        else if (data.sonuc === 'bos') { alertBox.textContent='Lütfen tüm alanları doldurun.'; alertBox.style.display='block'; }
        else { alertBox.textContent='Kullanıcı adı veya şifre yanlış.'; alertBox.style.display='block'; }
      } catch { alertBox.textContent='Sunucu hatası. Lütfen tekrar deneyin.'; alertBox.style.display='block'; }
      btn.disabled = false; btn.textContent = 'Giriş Yap';
    });
    document.addEventListener('visibilitychange', () => { document.title = document.visibilityState === 'hidden' ? 'Bizi unutma :)' : 'PANZER — Giriş'; });
  </script>
</body>
</html>
