<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PANZER — Kayıt Ol</title>
  <meta name="description" content="PANZER V3 Admin Panel Kayıt">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="/BellaMain/assets/css/pzr-auth.css" rel="stylesheet">
  <link href="/BellaMain/assets/css/panzer-brand.css" rel="stylesheet">
</head>
<body class="pzr-auth-body">
  <div class="pzr-auth-wrapper">
    <div class="pzr-auth-hero">
      <img src="/BellaMain/assets/media/panzer-mark.png" alt="PANZER" class="pzr-auth-hero-logo pzr-dragon-anim" onerror="this.style.display='none'">
      <h1>PANZER</h1>
      <p>Aramıza katılma vakti.</p>
    </div>
    <div class="pzr-auth-form-area">
      <div class="pzr-auth-card">
        <h2>Kayıt Ol</h2>
        <p class="pzr-subtitle">Yeni hesap oluştur</p>
        <div id="alertBox" class="pzr-alert pzr-alert-error"></div>
        <div id="successBox" class="pzr-alert pzr-alert-success"></div>
        <form id="signupForm" autocomplete="off">
          <div class="pzr-form-group">
            <label for="kul_id">Kullanıcı Adı</label>
            <input type="text" id="kul_id" name="kul_id" placeholder="Kullanıcı adınızı seçin" required autofocus>
          </div>
          <div class="pzr-form-group">
            <label for="kul_sifre">Şifre</label>
            <input type="password" id="kul_sifre" name="kul_sifre" placeholder="Güçlü bir şifre belirleyin" required>
          </div>
          <div class="pzr-form-group">
            <label for="ref_kod">Referans Kodu</label>
            <input type="text" id="ref_kod" name="ref_kod" placeholder="Davet kodunuzu girin" required>
          </div>
          <button type="submit" class="pzr-btn" id="submitBtn">Kayıt Ol</button>
        </form>
        <div class="pzr-auth-footer">Zaten hesabın var mı? <a href="/signin">Giriş Yap</a></div>
      </div>
    </div>
  </div>
  <div class="pzr-version">PANZER v3 · the designedbybossxxlife</div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn=document.getElementById('submitBtn'), alertBox=document.getElementById('alertBox'), successBox=document.getElementById('successBox');
      alertBox.style.display='none'; successBox.style.display='none';
      const kul_id=document.getElementById('kul_id').value.trim(), kul_sifre=document.getElementById('kul_sifre').value, ref_kod=document.getElementById('ref_kod').value.trim();
      if (!kul_id||!kul_sifre||!ref_kod) { alertBox.textContent='Lütfen tüm alanları doldurun.'; alertBox.style.display='block'; return; }
      btn.disabled=true; btn.textContent='Kayıt yapılıyor...';
      try {
        const res=await fetch('/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({kul_id,kul_sifre,ref_kod})});
        const data=await res.json();
        const msgs={bos:'Lütfen tüm alanları doldurun.',refhata:'Geçersiz referans kodu.',var:'Bu kullanıcı adı zaten alınmış.'};
        if (data.sonuc==='tamam') { Swal.fire({icon:'success',title:'Kayıt Başarılı!',text:'Giriş sayfasına yönlendiriliyorsunuz...',timer:2000,showConfirmButton:false}); setTimeout(()=>window.location.href='/signin',1800); }
        else { alertBox.textContent=msgs[data.sonuc]||'Bir hata oluştu.'; alertBox.style.display='block'; }
      } catch { alertBox.textContent='Sunucu hatası.'; alertBox.style.display='block'; }
      btn.disabled=false; btn.textContent='Kayıt Ol';
    });
    document.addEventListener('visibilitychange', () => { document.title=document.visibilityState==='hidden'?'Bizi unutma :)':'PANZER — Kayıt Ol'; });
  </script>
</body>
</html>
