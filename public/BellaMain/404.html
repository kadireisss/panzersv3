<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Sayfa Bulunamadı</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--accent:#6c5ce7}*{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e8e8ed;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .code{font-size:8rem;font-weight:900;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:.5rem;animation:glitch 3s ease-in-out infinite}
    @keyframes glitch{0%,90%,100%{transform:translate(0)}92%{transform:translate(-3px,2px)}94%{transform:translate(3px,-2px)}96%{transform:translate(-2px,-1px)}98%{transform:translate(2px,1px)}}
    h2{font-size:1.5rem;font-weight:600;margin-bottom:.75rem}p{font-size:.95rem;color:#8b8b9e;margin-bottom:2rem;max-width:400px}
    .back-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.75rem;background:linear-gradient(135deg,var(--accent),#5a4bd6);color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .3s;text-decoration:none}
    .back-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(108,92,231,.3)}.ver{position:fixed;bottom:1rem;font-size:.7rem;color:#55556a}
  </style>
</head>
<body>
  <div class="code">404</div>
  <h2>Sayfa Bulunamadı</h2>
  <p>Aradığınız sayfa mevcut değil veya taşınmış olabilir.</p>
  <a href="/signin" class="back-btn">← Ana Sayfaya Dön</a>
  <div class="ver">PANZER v3</div>
</body>
</html>
