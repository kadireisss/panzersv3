# İsteğe bağlı: şemayı Postgres üzerinden uygula (Supabase SQL Editor alternatifi)
# GitHub → Settings → Secrets → DATABASE_URL (doğrudan bağlantı, port 5432)
name: Apply database schema

on:
  workflow_dispatch:

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Apply schema.sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:apply
